id: hardcoded-password-exposure

info:
  name: Hardcoded Password Exposure in Config Files
  author: custom
  severity: high
  description: |
    Detects hardcoded passwords exposed in configuration files, environment files,
    and other sensitive endpoints. Hardcoded credentials pose a critical security
    risk as they can be extracted by attackers to gain unauthorized access.
  reference:
    - https://owasp.org/www-community/vulnerabilities/Use_of_hard-coded_password
  classification:
    cwe-id: CWE-259
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N
    cvss-score: 7.5
  tags: exposure,config,hardcoded,password,credentials,secret

requests:
  - method: GET
    path:
      # 环境变量文件
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.dev"
      - "{{BaseURL}}/.env.prod"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.development"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.example"
      # PHP 配置文件
      - "{{BaseURL}}/config.php"
      - "{{BaseURL}}/config.php.bak"
      - "{{BaseURL}}/config.inc.php"
      - "{{BaseURL}}/configuration.php"
      - "{{BaseURL}}/wp-config.php"
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/wp-config.php.old"
      - "{{BaseURL}}/app/config/database.php"
      - "{{BaseURL}}/application/config/database.php"
      # 数据库配置文件
      - "{{BaseURL}}/database.yml"
      - "{{BaseURL}}/config/database.yml"
      - "{{BaseURL}}/config/database.php"
      - "{{BaseURL}}/db.php"
      - "{{BaseURL}}/db_config.php"
      # Spring Boot / Java 配置
      - "{{BaseURL}}/application.properties"
      - "{{BaseURL}}/application.yml"
      - "{{BaseURL}}/application-prod.yml"
      - "{{BaseURL}}/application-production.yml"
      - "{{BaseURL}}/src/main/resources/application.properties"
      # Django / Python 配置
      - "{{BaseURL}}/settings.py"
      - "{{BaseURL}}/local_settings.py"
      - "{{BaseURL}}/config/settings.py"
      # 通用配置文件
      - "{{BaseURL}}/config.js"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yaml"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/secrets.yml"
      - "{{BaseURL}}/secrets.json"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        part: body
        condition: or
        regex:
          # password = "value" 或 password: value (通用格式)
          - '(?i)password\s*[=:]\s*["\x27]?[a-zA-Z0-9!@#$%^&*()_+\-=\[\]{}|;:,./<>?\\]{4,}["\x27]?'
          # passwd = "value"
          - '(?i)passwd\s*[=:]\s*["\x27]?[a-zA-Z0-9!@#$%^&*()_+\-=\[\]{}|;:,./<>?\\]{4,}["\x27]?'
          # DB_PASSWORD=value (环境变量格式)
          - '(?i)(DB|DATABASE|MYSQL|REDIS|MONGO|POSTGRES)_PASS(WORD)?\s*=\s*\S+'
          # secret_key = "value"
          - '(?i)(secret[_-]?key|app[_-]?secret|api[_-]?secret)\s*[=:]\s*["\x27]?[a-zA-Z0-9!@#$%^&*_\-]{8,}["\x27]?'
          # Spring Boot 数据源密码
          - '(?i)spring\.datasource\.password\s*=\s*\S+'
          # Django SECRET_KEY
          - "(?i)SECRET_KEY\\s*=\\s*[^\\s]{8,}"
          # PHP define('DB_PASSWORD', 'value')
          - "(?i)define\\s*\\(\\s*['\"].*pass.*['\"]\\s*,\\s*['\"][^'\"]{3,}['\"]"
          # access_key / auth_token
          - '(?i)(access[_-]?key|auth[_-]?token)\s*[=:]\s*["\x27]?[a-zA-Z0-9+/]{16,}["\x27]?'

    extractors:
      - type: regex
        part: body
        name: leaked_credential
        group: 0
        regex:
          - '(?i)password\s*[=:]\s*["\x27]?[^\s"&<>]{4,30}["\x27]?'
          - '(?i)(DB|DATABASE)_PASS(WORD)?\s*=\s*\S+'
          - '(?i)secret[_-]?key\s*[=:]\s*["\x27]?[a-zA-Z0-9!@#$%^&*_\-]{8,}["\x27]?'
